<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VideoTube</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <header class="header">
        <a href="index.html" class="header__logo">VideoTube</a>
        <nav class="header__menu">
            <a class="header__link" href="index.html">Home</a>
        </nav>
    </header>

    <main class="container py-4">

        <div class="auth-card">
            <h2 class="auth-titulo">Login</h2>

            <form id="login-form">
                <div class="mb-3">
                    <label for="username" class="form-label">Login</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Senha</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-outline-light flex-fill"
                        data-bs-toggle="modal" data-bs-target="#modalCadastro">Cadastrar</button>
                    <button type="submit" class="btn btn-danger flex-fill">Login</button>
                </div>
            </form>
        </div>

    </main>

    <!-- Modal de cadastro de novo usuário -->
    <div class="modal fade" id="modalCadastro" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Cadastro de Usuário</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="txt_login" class="form-label">Login</label>
                        <input type="text" id="txt_login" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="txt_nome" class="form-label">Nome completo</label>
                        <input type="text" id="txt_nome" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="txt_email" class="form-label">E-mail</label>
                        <input type="email" id="txt_email" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="txt_senha" class="form-label">Senha</label>
                        <input type="password" id="txt_senha" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="txt_senha2" class="form-label">Confirmação de senha</label>
                        <input type="password" id="txt_senha2" class="form-control">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" id="btn_salvar" class="btn btn-danger">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 VideoTube. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/scripts/login.js"></script>
    <script>
        // Trata o envio do formulário de login
        function processaFormLogin(event) {
            event.preventDefault();

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            if (loginUser(username, password)) {
                window.location.href = "index.html";
            } else {
                alert("Usuário ou senha incorretos.");
            }
        }

        // Trata o cadastro de novo usuário pelo modal
        function salvaCadastro() {
            const login = document.getElementById("txt_login").value;
            const nome = document.getElementById("txt_nome").value;
            const email = document.getElementById("txt_email").value;
            const senha = document.getElementById("txt_senha").value;
            const senha2 = document.getElementById("txt_senha2").value;

            if (!login || !nome || !email || !senha) {
                alert("Preencha todos os campos.");
                return;
            }
            if (senha !== senha2) {
                alert("As senhas informadas não conferem.");
                return;
            }

            addUser(nome, login, senha, email).then(function () {
                alert("Usuário cadastrado com sucesso. Faça o login.");
                bootstrap.Modal.getInstance(document.getElementById("modalCadastro")).hide();
                document.getElementById("login-form").reset();
            });
        }

        document.getElementById("login-form").addEventListener("submit", processaFormLogin);
        document.getElementById("btn_salvar").addEventListener("click", salvaCadastro);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Vídeos - VideoTube</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <header class="header">
        <a href="index.html" class="header__logo">VideoTube</a>
        <nav class="header__menu">
            <a class="header__link" href="index.html">Home</a>
            <a class="header__link" id="menu-cadastro" href="cadastro_itens.html">Cadastro</a>
            <a class="header__link" id="menu-favoritos" href="favoritos.html">Favoritos</a>
            <a class="header__link" id="menu-login" href="login.html">Login</a>
            <a class="header__link" id="menu-logout" href="#">Logout</a>
            <span class="header__usuario" id="menu-usuario"></span>
        </nav>
    </header>

    <main class="container py-4">

        <section class="secao">
            <h2 class="secao__titulo">Cadastro de Vídeos</h2>

            <div id="msg"></div>

            <form id="form-video">
                <div class="row g-3">
                    <div class="col-sm-2">
                        <label for="inputId" class="form-label">Id</label>
                        <input type="text" id="inputId" class="form-control" disabled>
                    </div>
                    <div class="col-sm-6">
                        <label for="inputTitulo" class="form-label">Título (*)</label>
                        <input type="text" id="inputTitulo" class="form-control" required>
                    </div>
                    <div class="col-sm-4">
                        <label for="inputCanal" class="form-label">Canal (*)</label>
                        <input type="text" id="inputCanal" class="form-control" required>
                    </div>
                    <div class="col-sm-3">
                        <label for="inputCategoria" class="form-label">Categoria (*)</label>
                        <input type="text" id="inputCategoria" class="form-control" required>
                    </div>
                    <div class="col-sm-3">
                        <label for="inputDuracao" class="form-label">Duração</label>
                        <input type="text" id="inputDuracao" class="form-control" placeholder="12:45">
                    </div>
                    <div class="col-sm-3">
                        <label for="inputData" class="form-label">Data</label>
                        <input type="date" id="inputData" class="form-control">
                    </div>
                    <div class="col-sm-3 d-flex align-items-end">
                        <div class="form-check">
                            <input type="checkbox" id="inputDestaque" class="form-check-input">
                            <label for="inputDestaque" class="form-check-label">Destaque</label>
                        </div>
                    </div>
                    <div class="col-sm-3">
                        <label for="inputViews" class="form-label">Visualizações</label>
                        <input type="number" id="inputViews" class="form-control" value="0">
                    </div>
                    <div class="col-sm-3">
                        <label for="inputLikes" class="form-label">Curtidas</label>
                        <input type="number" id="inputLikes" class="form-control" value="0">
                    </div>
                    <div class="col-sm-6">
                        <label for="inputImagem" class="form-label">Imagem (URL)</label>
                        <input type="text" id="inputImagem" class="form-control">
                    </div>
                    <div class="col-sm-6">
                        <label for="inputAvatar" class="form-label">Avatar do canal (URL)</label>
                        <input type="text" id="inputAvatar" class="form-control">
                    </div>
                    <div class="col-12">
                        <label for="inputDescricao" class="form-label">Descrição</label>
                        <input type="text" id="inputDescricao" class="form-control">
                    </div>
                    <div class="col-12">
                        <label for="inputConteudo" class="form-label">Conteúdo</label>
                        <textarea id="inputConteudo" class="form-control" rows="3"></textarea>
                    </div>
                </div>

                <p class="mt-2"><small>(*) Campos obrigatórios</small></p>

                <div class="d-flex flex-wrap gap-2">
                    <button type="button" id="btnInsert" class="btn btn-success">Inserir</button>
                    <button type="button" id="btnUpdate" class="btn btn-warning">Alterar</button>
                    <button type="button" id="btnDelete" class="btn btn-danger">Excluir</button>
                    <button type="button" id="btnClear" class="btn btn-secondary">Limpar Formulário</button>
                </div>
            </form>
        </section>

        <section class="secao">
            <h2 class="secao__titulo">Listagem de Vídeos</h2>
            <div class="table-responsive">
                <table id="grid-videos" class="table table-striped align-middle">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Título</th>
                            <th>Canal</th>
                            <th>Categoria</th>
                            <th>Visualizações</th>
                            <th>Destaque</th>
                        </tr>
                    </thead>
                    <tbody id="table-videos"></tbody>
                </table>
            </div>
        </section>

    </main>

    <footer class="footer">
        <p>&copy; 2026 VideoTube. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/scripts/login.js"></script>
    <script src="assets/scripts/crud.js"></script>
    <script>
        // Guarda os vídeos carregados para preencher o formulário ao clicar numa linha
        let listaVideos = [];

        // Lê os campos do formulário e monta um objeto de vídeo
        function lerFormulario() {
            return {
                titulo: document.getElementById("inputTitulo").value,
                canal: document.getElementById("inputCanal").value,
                categoria: document.getElementById("inputCategoria").value,
                duracao: document.getElementById("inputDuracao").value,
                data: document.getElementById("inputData").value,
                views: parseInt(document.getElementById("inputViews").value) || 0,
                likes: parseInt(document.getElementById("inputLikes").value) || 0,
                imagem: document.getElementById("inputImagem").value,
                avatar: document.getElementById("inputAvatar").value,
                descricao: document.getElementById("inputDescricao").value,
                conteudo: document.getElementById("inputConteudo").value,
                destaque: document.getElementById("inputDestaque").checked
            };
        }

        // Atualiza a tabela com os vídeos do JSON Server
        function exibeVideos() {
            const corpo = document.getElementById("table-videos");
            corpo.innerHTML = "";

            readVideo(function (dados) {
                listaVideos = dados;
                dados.forEach(function (video) {
                    corpo.innerHTML +=
                        "<tr>" +
                            "<td>" + video.id + "</td>" +
                            "<td>" + video.titulo + "</td>" +
                            "<td>" + video.canal + "</td>" +
                            "<td>" + video.categoria + "</td>" +
                            "<td>" + video.views + "</td>" +
                            "<td>" + (video.destaque ? "Sim" : "Não") + "</td>" +
                        "</tr>";
                });
            });
        }

        function init() {
            // Restringe a tela a administradores
            const usuario = usuarioLogado();
            if (!usuario || !usuario.admin) {
                alert("Acesso restrito a administradores.");
                window.location.href = "index.html";
                return;
            }

            const formVideo = document.getElementById("form-video");

            document.getElementById("btnInsert").addEventListener("click", function () {
                if (!formVideo.checkValidity()) {
                    formVideo.reportValidity();
                    return;
                }
                const video = lerFormulario();
                video.fotos = [];
                createVideo(video, exibeVideos);
                formVideo.reset();
            });

            document.getElementById("btnUpdate").addEventListener("click", function () {
                const id = document.getElementById("inputId").value;
                if (id === "") {
                    displayMessage("Selecione antes um vídeo para alterar.");
                    return;
                }
                updateVideo(id, lerFormulario(), exibeVideos);
                formVideo.reset();
            });

            document.getElementById("btnDelete").addEventListener("click", function () {
                const id = document.getElementById("inputId").value;
                if (id === "") {
                    displayMessage("Selecione antes um vídeo para excluir.");
                    return;
                }
                deleteVideo(id, exibeVideos);
                formVideo.reset();
            });

            document.getElementById("btnClear").addEventListener("click", function () {
                formVideo.reset();
            });

            // Ao clicar numa linha da tabela, preenche o formulário com o vídeo
            document.getElementById("grid-videos").addEventListener("click", function (e) {
                if (e.target.tagName !== "TD") return;

                const id = e.target.parentNode.querySelectorAll("td")[0].innerText;
                const video = listaVideos.find(function (v) {
                    return String(v.id) === String(id);
                });
                if (!video) return;

                document.getElementById("inputId").value = video.id;
                document.getElementById("inputTitulo").value = video.titulo || "";
                document.getElementById("inputCanal").value = video.canal || "";
                document.getElementById("inputCategoria").value = video.categoria || "";
                document.getElementById("inputDuracao").value = video.duracao || "";
                document.getElementById("inputData").value = video.data || "";
                document.getElementById("inputViews").value = video.views || 0;
                document.getElementById("inputLikes").value = video.likes || 0;
                document.getElementById("inputImagem").value = video.imagem || "";
                document.getElementById("inputAvatar").value = video.avatar || "";
                document.getElementById("inputDescricao").value = video.descricao || "";
                document.getElementById("inputConteudo").value = video.conteudo || "";
                document.getElementById("inputDestaque").checked = !!video.destaque;
            });

            exibeVideos();
        }

        document.addEventListener("DOMContentLoaded", init);
    </script>
</body>
</html>
